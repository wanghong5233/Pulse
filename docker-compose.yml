name: pulse

# Default stack:
#   - `docker compose up -d postgres pulse-api` starts the full stack.
#   - `docker compose up -d postgres` starts only the DB sidecar.
#   - `docker compose --profile rsshub up -d rsshub redis-rsshub` starts the
#     optional self-hosted RSSHub for the intel module. Public mirrors
#     (rsshub.app / rsshub.rssforever.com) are still tried as fallback, so
#     the intel pipeline works without this profile too.
#
# Environment variables feed in from `.env`; anything not listed here falls
# back to the application defaults in `src/pulse/core/config.py`.

services:
  postgres:
    image: postgres:16
    container_name: pulse-pg
    restart: unless-stopped
    environment:
      POSTGRES_DB: pulse
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pulse
    ports:
      - "15433:5432"
    volumes:
      - pulse_pg_data:/var/lib/postgresql/data
      - ./infra/sql/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pulse"]
      interval: 10s
      timeout: 5s
      retries: 5

  pulse-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pulse-api
    restart: unless-stopped
    environment:
      PULSE_ENVIRONMENT: docker
      PULSE_HOST: 0.0.0.0
      PULSE_PORT: 8010
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:pulse@postgres:5432/pulse}
      LANGGRAPH_CHECKPOINT_DATABASE_URL: ${LANGGRAPH_CHECKPOINT_DATABASE_URL:-postgresql://postgres:pulse@postgres:5432/pulse}

      PULSE_ROUTER_RULES_PATH: /app/config/router_rules.json
      PULSE_POLICY_RULES_PATH: /app/config/policy_rules.json
      PULSE_EVOLUTION_RULES_PATH: /app/config/evolution_rules.json
      PULSE_SOUL_CONFIG_PATH: /app/config/soul.yaml
      PULSE_MCP_SERVERS_CONFIG_PATH: /app/config/mcp_servers.yaml

      PULSE_CORE_MEMORY_PATH: /root/.pulse/core_memory.json
      PULSE_GOVERNANCE_AUDIT_PATH: /root/.pulse/governance_audit.json
      PULSE_GOVERNANCE_RULES_VERSIONS_PATH: /root/.pulse/governance_rules_versions.json
      PULSE_DPO_PAIRS_PATH: /root/.pulse/dpo_pairs.jsonl
      PULSE_DPO_AUTO_COLLECT: ${PULSE_DPO_AUTO_COLLECT:-true}
      PULSE_EVOLUTION_DEFAULT_MODE: ${PULSE_EVOLUTION_DEFAULT_MODE:-autonomous}
      PULSE_EVOLUTION_PREFS_MODE: ${PULSE_EVOLUTION_PREFS_MODE:-autonomous}
      PULSE_EVOLUTION_SOUL_MODE: ${PULSE_EVOLUTION_SOUL_MODE:-supervised}
      PULSE_EVOLUTION_BELIEF_MODE: ${PULSE_EVOLUTION_BELIEF_MODE:-autonomous}
      PULSE_GENERATED_SKILLS_DIR: /root/.pulse/generated/skills

      PULSE_MCP_HTTP_BASE_URL: ${PULSE_MCP_HTTP_BASE_URL:-}
      PULSE_MCP_HTTP_TIMEOUT_SEC: ${PULSE_MCP_HTTP_TIMEOUT_SEC:-8}
      PULSE_MCP_HTTP_AUTH_TOKEN: ${PULSE_MCP_HTTP_AUTH_TOKEN:-}

      FEISHU_WEBHOOK_URL: ${FEISHU_WEBHOOK_URL:-}
      NOTIFY_WEBHOOK_URL: ${NOTIFY_WEBHOOK_URL:-}
      PULSE_FEISHU_SIGN_SECRET: ${PULSE_FEISHU_SIGN_SECRET:-}

      # Intel module — RSSHub instances tried in order. Self-hosted
      # rsshub:1200 is only present when the `rsshub` profile is up; the
      # public mirrors still resolve when the profile is off, so the
      # intel pipeline degrades gracefully instead of failing the patrol.
      PULSE_INTEL_RSSHUB_INSTANCES: ${PULSE_INTEL_RSSHUB_INSTANCES:-http://rsshub:1200,https://rsshub.app,https://rsshub.rssforever.com}
    volumes:
      - pulse_memory_data:/root/.pulse
    ports:
      - "8010:8010"
    depends_on:
      postgres:
        condition: service_healthy

  # ── Optional: self-hosted RSSHub for the intel module ───────────────────
  # Run with `docker compose --profile rsshub up -d`. RSSHub itself is
  # stateless; the redis sidecar is its cache (image upstream defaults).
  # Healthchecks let pulse-api treat RSSHub as a soft dependency: the
  # module's RssFetcher probes the instance before each request and falls
  # back to public mirrors when it's not ready.
  rsshub:
    image: diygod/rsshub:latest
    container_name: pulse-rsshub
    profiles: ["rsshub"]
    restart: unless-stopped
    environment:
      NODE_ENV: production
      CACHE_TYPE: redis
      REDIS_URL: redis://redis-rsshub:6379/
      REQUEST_RETRY: "1"
      REQUEST_TIMEOUT: "8000"
    ports:
      - "1200:1200"
    depends_on:
      redis-rsshub:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:1200/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis-rsshub:
    image: redis:7-alpine
    container_name: pulse-rsshub-redis
    profiles: ["rsshub"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  pulse_pg_data:
  pulse_memory_data:
